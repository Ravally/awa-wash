<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600"/>
      <stop offset="50%" style="stop-color:#FFEA00"/>
      <stop offset="100%" style="stop-color:#FFD600"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="400" height="120" rx="8" ry="8" fill="#0A0A0A"/>

  <!-- Yellow border -->
  <rect x="4" y="4" width="392" height="112" rx="6" ry="6" fill="none" stroke="#FFD600" stroke-width="2.5"/>

  <!-- Water droplet icon -->
  <g transform="translate(38, 18)">
    <!-- Droplet shape -->
    <path d="M22 0 C22 0 0 32 0 50 C0 62.15 9.85 72 22 72 C34.15 72 44 62.15 44 50 C44 32 22 0 22 0Z" fill="url(#goldShine)"/>
    <!-- Sparkle/shine inside droplet -->
    <ellipse cx="15" cy="38" rx="6" ry="10" fill="#0A0A0A" opacity="0.2" transform="rotate(-15, 15, 38)"/>
    <!-- Wave lines inside droplet -->
    <path d="M10 52 Q16 48 22 52 Q28 56 34 52" fill="none" stroke="#0A0A0A" stroke-width="2" opacity="0.3"/>
    <path d="M12 58 Q18 54 24 58 Q30 62 36 58" fill="none" stroke="#0A0A0A" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- AWA text -->
  <text x="100" y="58" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="48" fill="#FFD600" letter-spacing="4">AWA</text>

  <!-- WASH text -->
  <text x="230" y="58" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" letter-spacing="4">WASH</text>

  <!-- Tagline -->
  <text x="200" y="82" font-family="'Arial', 'Helvetica', sans-serif" font-weight="400" font-size="11" fill="#FFD600" text-anchor="middle" letter-spacing="5" text-transform="uppercase">HOUSE CLEANING WITH PURPOSE</text>

  <!-- Accent line -->
  <line x1="100" y1="90" x2="300" y2="90" stroke="#FFD600" stroke-width="1" opacity="0.3"/>

  <!-- Tree icon (eco element) -->
  <g transform="translate(176, 94)" opacity="0.6">
    <path d="M8 0 L0 12 L4 12 L4 16 L12 16 L12 12 L16 12 Z" fill="#4CAF50"/>
  </g>

  <!-- Wellington NZ -->
  <text x="200" y="108" font-family="'Arial', 'Helvetica', sans-serif" font-weight="400" font-size="8" fill="#888888" text-anchor="middle" letter-spacing="3">WELLINGTON, NZ</text>
</svg>