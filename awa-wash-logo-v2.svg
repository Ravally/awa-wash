<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bungee&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" rx="16" fill="#1A1710"/>

  <!-- Decorative corner accents -->
  <path d="M0 16 Q0 0 16 0 L60 0 L60 4 L16 4 Q4 4 4 16 L4 60 L0 60 Z" fill="#FFD600" opacity="0.6"/>
  <path d="M480 16 Q480 0 464 0 L420 0 L420 4 L464 4 Q476 4 476 16 L476 60 L480 60 Z" fill="#FFD600" opacity="0.6"/>
  <path d="M0 184 Q0 200 16 200 L60 200 L60 196 L16 196 Q4 196 4 184 L4 140 L0 140 Z" fill="#FFD600" opacity="0.6"/>
  <path d="M480 184 Q480 200 464 200 L420 200 L420 196 L464 196 Q476 196 476 184 L476 140 L480 140 Z" fill="#FFD600" opacity="0.6"/>

  <!-- Water drop icon -->
  <g transform="translate(56, 40)">
    <!-- Drop circle background -->
    <circle cx="32" cy="32" r="32" fill="#FFD600"/>
    <circle cx="32" cy="32" r="29" fill="none" stroke="#1A1710" stroke-width="2.5"/>
    <!-- Drop shape -->
    <path d="M32 14 C32 14 18 30 18 38 C18 45.73 24.27 52 32 52 C39.73 52 46 45.73 46 38 C46 30 32 14 32 14Z" fill="#1A1710"/>
    <!-- Shine on drop -->
    <ellipse cx="27" cy="34" rx="3" ry="5" fill="#FFD600" opacity="0.4" transform="rotate(-10, 27, 34)"/>
    <!-- Wave in drop -->
    <path d="M22 42 Q27 39 32 42 Q37 45 42 42" fill="none" stroke="#FFD600" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- AWA text -->
  <text x="140" y="88" font-family="'Bungee', Impact, sans-serif" font-size="60" fill="#FFD600" letter-spacing="4">AWA</text>

  <!-- WASH text -->
  <text x="308" y="88" font-family="'Bungee', Impact, sans-serif" font-size="60" fill="#F5F0E8" letter-spacing="4">WASH</text>

  <!-- Divider line -->
  <line x1="140" y1="100" x2="470" y2="100" stroke="#FFD600" stroke-width="3"/>

  <!-- Tagline -->
  <text x="140" y="124" font-family="'Bungee', Impact, sans-serif" font-size="16" fill="#FFD600" letter-spacing="6">HOUSE WASHING WITH PURPOSE</text>

  <!-- Location badge -->
  <rect x="140" y="138" width="160" height="28" rx="14" fill="none" stroke="rgba(245,240,232,0.2)" stroke-width="1.5"/>
  <text x="220" y="157" font-family="sans-serif" font-size="11" fill="rgba(245,240,232,0.5)" text-anchor="middle" letter-spacing="3">WELLINGTON, NZ</text>

  <!-- Eco leaf badge -->
  <g transform="translate(320, 140)">
    <rect width="100" height="28" rx="14" fill="#2D5A3D"/>
    <text x="50" y="18" font-family="sans-serif" font-size="10" fill="#F5F0E8" text-anchor="middle" letter-spacing="1.5">ECO-FRIENDLY</text>
  </g>

  <!-- Sparkle decorations -->
  <g fill="#FFD600" opacity="0.3">
    <circle cx="450" cy="45" r="2"/>
    <circle cx="460" cy="55" r="1.5"/>
    <circle cx="440" cy="52" r="1"/>
    <circle cx="130" cy="145" r="1.5"/>
  </g>
</svg>